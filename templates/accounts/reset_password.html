{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'mycashbook_logo.png' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="title">🔐 Set New Password</h2>

            <form method="POST" class="auth-form">
                {% csrf_token %}

                <div class="input-group">
                    <input type="password" name="password1" placeholder="&#9919; Enter New Password" required
                        autocomplete="new-password">
                </div>

                <div class="input-group">
                    <input type="password" name="password2" placeholder="&#9919; Confirm New Password" required
                        autocomplete="new-password">
                </div>

                <button type="submit" class="btn-primary">Update Password</button>
            </form>
        </div>
    </div>

    {% include 'partials/message_cards.html' %}

    <style>
        :root {
            /* Metallic Orange Touch - Light Mode */
            --brand-blue: #F97316;
            /* Orange */
            --brand-purple: #EA580C;
            /* Darker Orange */
            --brand-dark: #F97316;
            --primary-color: #F97316;
            --primary-dark: #EA580C;
            --success-color: #10B981;
            --error-color: #EF4444;
            --danger-color: #EF4444;
            --warning-color: #FBBF24;

            --bg-color: #F4F4F5;
            /* Polished Silver */
            --bg-gradient: #F4F4F5;
            --text-color: #1C1C1E;
            --text-main: #1C1C1E;
            --text-dark: #1C1C1E;
            --text-light: #8E8E93;
            --text-muted: #8E8E93;

            --card-bg: #FFFFFF;
            --container-bg: #FFFFFF;
            --card-bg-opacity: 0.95;
            --card-blur: 12px;

            --card-border: #D1D1D6;
            --input-bg: #FFFFFF;
            --input-border: #D1D1D6;

            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --light-gray: #E5E5EA;
            --table-hover: #F4F4F5;
            --title-gradient: #F97316;
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body.dark-mode {
            /* Metallic Orange Touch - Dark Mode */
            --brand-blue: #FB923C;
            /* Lighter Orange */
            --brand-purple: #F97316;
            --brand-dark: #FB923C;
            --primary-color: #FB923C;
            --primary-dark: #F97316;
            --success-color: #34D399;
            --error-color: #F87171;
            --danger-color: #F87171;
            --warning-color: #FCD34D;

            --bg-color: #121214;
            /* Deep Titanium */
            --bg-gradient: #121214;
            --text-color: #E5E5EA;
            --text-main: #E5E5EA;
            --text-dark: #E5E5EA;
            --text-light: #A1A1AA;
            --text-muted: #A1A1AA;

            --card-bg: #1C1C1E;
            /* Gunmetal */
            --container-bg: #1C1C1E;

            --card-border: #3A3A3C;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: #3A3A3C;

            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.6);
            --light-gray: rgba(255, 255, 255, 0.05);
            --table-hover: rgba(255, 255, 255, 0.1);
            --title-gradient: #FB923C;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }

        /* Variables for Easy Theming */


        /* Base Styles */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--background-start), var(--background-end));
        }

        /* Center wrapper */
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Card - Glassmorphism Enhanced */
        .auth-card {
            background: var(--card-background);
            /* backdrop-filter: blur(20px); - Kept the blur effect */
            padding: 40px 35px;
            /* Increased top/bottom padding */
            border-radius: 20px;
            /* Softer radius */
            width: 100%;
            max-width: 400px;
            /* Consistent maximum width */
            text-align: center;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            /* Bouncier animation */
            box-shadow: var(--shadow-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Subtle white border for glass effect */
        }

        /* Title */
        .title {
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 28px;
            /* Slightly larger title */
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Input Group Styling */
        .input-group {
            margin-bottom: 18px;
            /* Added spacing between input groups */
        }

        /* Input */
        .input-group input {
            width: 100%;
            padding: 15px;
            /* Increased padding */
            border-radius: 10px;
            /* Softer radius */
            border: 1px solid transparent;
            /* Ensure border exists for consistency */
            background: rgba(255, 255, 255, 0.1);
            /* Slightly less opacity */
            color: var(--text-color);
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: var(--placeholder-color);
            opacity: 0.8;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px var(--primary-color);
            /* Bright focus ring */
            transform: none;
            /* Removed the small scale animation for a cleaner focus */
        }

        /* Button */
        .btn-primary {
            width: 100%;
            padding: 15px;
            /* Increased padding */
            margin-top: 25px;
            /* Increased margin */
            border: none;
            border-radius: 12px;
            /* Consistent border radius */
            background: var(--primary-color);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(106, 141, 255, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            /* Lift effect */
            box-shadow: 0 6px 20px rgba(106, 141, 255, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Animation */
        @keyframes popUp {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
                border-radius: 16px;
            }

            .title {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .input-group input {
                padding: 14px;
                font-size: 15px;
            }

            .btn-primary {
                padding: 14px;
                font-size: 17px;
            }
        }
    </style>

</body>

</html>
