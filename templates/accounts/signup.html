{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'mycashbook_logo.png' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MyCashBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Metallic Orange Touch - Light Mode */
            --brand-blue: #F97316;
            /* Orange */
            --brand-purple: #EA580C;
            /* Darker Orange */
            --brand-dark: #F97316;
            --primary-color: #F97316;
            --primary-dark: #EA580C;
            --success-color: #10B981;
            --error-color: #EF4444;
            --danger-color: #EF4444;
            --warning-color: #FBBF24;

            --bg-color: #F4F4F5;
            /* Polished Silver */
            --bg-gradient: #F4F4F5;
            --text-color: #1C1C1E;
            --text-main: #1C1C1E;
            --text-dark: #1C1C1E;
            --text-light: #8E8E93;
            --text-muted: #8E8E93;

            --card-bg: #FFFFFF;
            --container-bg: #FFFFFF;
            --card-bg-opacity: 0.95;
            --card-blur: 12px;

            --card-border: #D1D1D6;
            --input-bg: #FFFFFF;
            --input-border: #D1D1D6;

            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --light-gray: #E5E5EA;
            --table-hover: #F4F4F5;
            --title-gradient: #F97316;
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body.dark-mode {
            /* Metallic Orange Touch - Dark Mode */
            --brand-blue: #FB923C;
            /* Lighter Orange */
            --brand-purple: #F97316;
            --brand-dark: #FB923C;
            --primary-color: #FB923C;
            --primary-dark: #F97316;
            --success-color: #34D399;
            --error-color: #F87171;
            --danger-color: #F87171;
            --warning-color: #FCD34D;

            --bg-color: #121214;
            /* Deep Titanium */
            --bg-gradient: #121214;
            --text-color: #E5E5EA;
            --text-main: #E5E5EA;
            --text-dark: #E5E5EA;
            --text-light: #A1A1AA;
            --text-muted: #A1A1AA;

            --card-bg: #1C1C1E;
            /* Gunmetal */
            --container-bg: #1C1C1E;

            --card-border: #3A3A3C;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: #3A3A3C;

            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.6);
            --light-gray: rgba(255, 255, 255, 0.05);
            --table-hover: rgba(255, 255, 255, 0.1);
            --title-gradient: #FB923C;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Variables for Theming */


        /* Dynamic Background */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            /* Deep Forest Base */
            color: var(--text-dark);
            padding: 20px;
        }

        /* Brand Header */
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .brand-header h1 {
            font-size: 50px;
            color: var(--brand-blue);
            /* Neon Lime */
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
            margin-bottom: 5px;
        }

        .brand-header p {
            font-size: 16px;
            color: var(--text-light);
            /* Muted */
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            font-weight: 500;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Signup Card - Enhanced Glassmorphism */
        .card {
            background: var(--card-bg);
            /* Container Deep Forest */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeInUp 1.2s ease;
            border: 1px solid rgba(39, 39, 42, 0.8);
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h2 {
            margin-bottom: 30px;
            color: var(--text-dark);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Input Fields */
        input {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 18px;
            /* Consistent margin */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            /* very dark input */
            color: var(--text-dark);
        }

        input::placeholder {
            color: var(--text-light);
            /* Muted placeholder */
        }

        input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(39, 39, 42, 0.8);
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Button Styling */
        .signup-button {
            width: 100%;
            padding: 16px;
            margin-top: 5px;
            border: none;
            border-radius: 12px;
            background: var(--brand-blue);
            color: #FFFFFF;
            /* Deep Forest text inside lime button */
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 8px 20px rgba(39, 39, 42, 0.8);
            /* Flexbox for centering loader/text */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-button:hover {
            background: var(--brand-purple);
            /* Hover lime */
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        /* ---------------------------------------------------- */
        /* NEW: Active/Press Animation */
        /* ---------------------------------------------------- */
        .signup-button:active {
            /* Squish effect on press */
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(39, 39, 42, 0.8);
            transition: all 0.1s ease-out;
            /* Faster transition for press feedback */
        }

        /* NEW: Loading State Styling */
        .signup-button.loading {
            pointer-events: none;
            /* Disable clicking while loading */
            background-position: 100% 0%;
            opacity: 0.8;
        }

        /* NEW: Loader Animation */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loader {
            display: inline-block;
            margin-left: 10px;
            width: 1.2em;
            height: 1.2em;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            visibility: hidden;
            /* Hide by default */
        }

        .signup-button.loading .button-text {
            margin-right: 10px;
            /* Space between text and loader */
        }

        .signup-button.loading .loader {
            visibility: visible;
            /* Show when loading */
        }

        /* ---------------------------------------------------- */


        /* Links and Typography */
        p {
            margin-top: 20px;
            font-size: 15px;
            color: var(--text-light);
        }

        p a {
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        p a:hover {
            color: var(--brand-purple);
            text-decoration: underline;
        }

        /* ===================== */
        /* Popup Messages Cards - Standard Django Messages Framework */
        /* ===================== */
        #messageContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            /* Ensure it stays on top */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-card {
            min-width: 280px;
            max-width: 400px;
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateX(40px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
        }

        /* Note: The old CSS keyframes were removed, replaced by the JS + transition */

        .message-card.success {
            background-color: var(--success-color);
        }

        .message-card.error {
            background-color: var(--error-color);
        }

        /* This class is added by JS after load to trigger the entry animation */
        .message-card.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* ----------------- Responsive Design ----------------- */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .brand-header {
                margin-bottom: 20px;
            }

            .brand-header h1 {
                font-size: 40px;
            }

            .card {
                padding: 30px 25px;
                border-radius: 16px;
            }

            h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            input {
                padding: 14px 16px;
                font-size: 15px;
                margin-bottom: 15px;
            }

            .signup-button {
                padding: 14px;
                font-size: 18px;
                margin-top: 15px;
            }

            #messageContainer {
                right: 10px;
                top: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="brand-header">
        <h1>MyCashBook</h1>
        <p>💸 Start Tracking Your Expenses</p>
    </div>

    <div class="card">
        <h2>Create an Account</h2>
        <form method="POST" id="signupForm">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
            <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
            <input type="password" name="password1" placeholder="Password" required autocomplete="new-password">
            <input type="password" name="password2" placeholder="Confirm Password" required autocomplete="new-password">
            <button type="submit" class="signup-button" id="signupButton">
                <span class="button-text">Sign Up</span>
                <span class="loader"></span>
            </button>
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>

    <div id="messageContainer">
        {% if messages %}
        {% for message in messages %}
        <div class="message-card {% if message.tags == 'success' %}success{% else %}error{% endif %}">
            <p>{{ message }}</p>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const signupButton = document.getElementById('signupButton');
        const messagesCard = document.querySelectorAll('.message-card');

        // Message Card Logic
        messagesCard.forEach(msg => {
            // 1. Show the message with the animation effect (using the .show class)
            setTimeout(() => {
                msg.classList.add('show');
            }, 50);

            // 2. Hide and remove the message after the display time
            setTimeout(() => {
                msg.style.opacity = '0';
                msg.style.transform = 'translateX(50px)'; // Slide out right
                setTimeout(() => msg.remove(), 800); // Remove from DOM after transition
            }, 4000); // Show for 4 seconds
        });

        // Button Press Animation Logic
        signupButton.addEventListener('click', function (e) {
            // Only trigger the animation if the form is valid (browser check)
            if (signupForm.checkValidity()) {
                e.preventDefault(); // Stop immediate submission

                // 1. Start loading animation and change text
                this.classList.add('loading');
                this.querySelector('.button-text').textContent = 'Creating Account...';

                // 2. Simulate process/delay, then submit
                setTimeout(() => {
                    signupForm.submit();
                }, 2000); // 2-second delay before submission
            }
        });
    </script>

</body>

</html>
