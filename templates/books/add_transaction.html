{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'mycashbook_logo.png' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction - {{ book.name }}</title>
    <style>
        :root {
            /* Classic Metallic - Light Mode */
            --brand-blue: #A38347; /* Gold */
            --brand-purple: #8A6D3B; /* Deep Gold */
            --brand-dark: #A38347;
            --primary-color: #A38347; 
            --primary-dark: #8A6D3B; 
            --success-color: #4A8B58;
            --error-color: #B83A42;
            --danger-color: #B83A42;
            --warning-color: #C0A062;
            
            --bg-color: #F4F4F5; /* Polished Silver */
            --bg-gradient: #F4F4F5;
            --text-color: #1C1C1E;
            --text-main: #1C1C1E;
            --text-dark: #1C1C1E;
            --text-light: #8E8E93;
            --text-muted: #8E8E93;
            
            --card-bg: #FFFFFF;
            --container-bg: #FFFFFF;
            --card-bg-opacity: 0.95;
            --card-blur: 12px;
            
            --card-border: #D1D1D6;
            --input-bg: #FFFFFF;
            --input-border: #D1D1D6;
            
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --light-gray: #E5E5EA;
            --table-hover: #F4F4F5;
            --title-gradient: #A38347;
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body.dark-mode {
            /* Classic Metallic - Dark Mode */
            --brand-blue: #C0A062; /* Bright Gold */
            --brand-purple: #A38347;
            --brand-dark: #C0A062;
            --primary-color: #C0A062; 
            --primary-dark: #A38347; 
            --success-color: #5B8A62;
            --error-color: #C94A53;
            --danger-color: #C94A53;
            --warning-color: #D4AF37;
            
            --bg-color: #121214; /* Deep Titanium */
            --bg-gradient: #121214;
            --text-color: #E5E5EA;
            --text-main: #E5E5EA;
            --text-dark: #E5E5EA;
            --text-light: #A1A1AA;
            --text-muted: #A1A1AA;
            
            --card-bg: #1C1C1E; /* Gunmetal */
            --container-bg: #1C1C1E;
            
            --card-border: #3A3A3C;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: #3A3A3C;
            
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.6);
            --light-gray: rgba(255, 255, 255, 0.05);
            --table-hover: rgba(255, 255, 255, 0.1);
            --title-gradient: #C0A062;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            /* Deep Forest Base */
            padding: 20px;
            color: var(--text-color);
        }

        h2 {
            margin-bottom: 15px;
            color: #4F46E5;
            /* Neon Lime Accent */
        }

        button,
        a {
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-weight: bold;
        }

        button {
            background: #4F46E5;
            color: #FFFFFF;
        }

        button:hover {
            background: #4338CA;
            transform: scale(1.05);
        }

        a {
            background: rgba(255, 255, 255, 0.1);
            color: #4F46E5;
            margin-top: 10px;
            display: inline-block;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        input:focus,
        select:focus {
            border-color: #4F46E5;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            /* Darker overlay */
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: #18181B;
            /* Container Deep Forest */
            margin: 10% auto;
            padding: 25px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: slideDown 0.3s ease;
            border: 1px solid rgba(39, 39, 42, 0.8);
        }

        .close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #A1A1AA;
            /* Muted text */
        }

        .close:hover {
            color: #EF4444;
            /* Vibrant Red */
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <h2>Add Transaction for "{{ book.name }}"</h2>
    <button id="openModal">➕ Add Transaction</button>
    <a href="{% url 'book_detail' book.id %}">⬅ Back to Book</a>

    <!-- Add Transaction Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" id="addClose">&times;</span>
            <h2>Add Transaction</h2>
            <form method="POST" id="addForm">
                {% csrf_token %}

                <label>Date:</label>
                <input type="date" name="created_at" value="{{ today }}" required>

                <label>Amount:</label>
                <input type="number" step="0.01" name="amount" required>

                <label>Type:</label>
                <select name="type" required>
                    <option value="deposit">Deposit</option>
                    <option value="withdraw">Withdraw</option>
                </select>

                <label>Note:</label>
                <input type="text" name="note">

                <button type="submit">Save Transaction</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const addModal = document.getElementById('addModal');
            const openModal = document.getElementById('openModal');
            const addClose = document.getElementById('addClose');

            openModal.onclick = () => addModal.style.display = 'block';
            addClose.onclick = () => addModal.style.display = 'none';

            window.onclick = (event) => {
                if (event.target == addModal) addModal.style.display = 'none';
            }
        });
    </script>

</body>

</html>
